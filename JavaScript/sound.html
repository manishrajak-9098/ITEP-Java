<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: #f2f2f2;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
  <body>
    <div>
      <img height="300" src="./car.jpg" alt="" />
    </div>
    <button onclick="play()">Start</button>
    <button onclick="pause()">Stop</button>


    <script>
        let audio=new Audio('car-sound.mp3')
        
        function play(){
            audio.play()
        }
        function pause(){
            audio.pause()   
        }

        
    </script>
  </body>
</html>
